name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit & API Tests (no GPU)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg colmap

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Install CPU-only PyTorch for CI (no GPU available)
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pytest pytest-asyncio httpx

      - name: Generate synthetic test video
        run: |
          mkdir -p tests/fixtures tests/logs
          python tests/fixtures/generate_synthetic.py

      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: "backend"
        run: |
          python -m pytest tests/test_pipeline_unit.py tests/test_frontend.py \
            -v \
            --tb=short \
            -m "not slow" \
            --log-cli-level=INFO \
            -p no:warnings

      - name: Run API tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: "backend"
        run: |
          python -m pytest tests/test_api.py \
            -v \
            --tb=short \
            -m "not slow" \
            --log-cli-level=INFO \
            -p no:warnings

      - name: Run quick E2E tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: "backend"
        run: |
          python -m pytest tests/test_pipeline_e2e.py \
            -v \
            --tb=short \
            -m "not slow" \
            --log-cli-level=INFO \
            -p no:warnings

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_number }}
          path: tests/logs/
          retention-days: 14

  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
